      allowed_types: [GENERAL, PARCEL]

    - room_code: SUT-A
      room_name: 스위트 A
      stock_count: 2
      prices: { PARCEL: 350000 }
      allowed_types: [PARCEL]

    - room_code: PRS-A
      room_name: 프리미엄 스위트 A
      stock_count: 1
      prices: { PARCEL: 500000 }
      allowed_types: [PARCEL]

## -------------------------------------------------------
## 3. API
## -------------------------------------------------------
apis:

  # --- 회원 ---
  - { method: POST, path: /api/members/signup,        entity: Member,      action: create, auth: false, description: 회원가입 }
  - { method: POST, path: /api/members/login,          entity: Member,      action: custom, auth: false, description: 로그인 }
  - { method: GET,  path: /api/members/check-id/{id},  entity: Member,      action: custom, auth: false, description: 아이디 중복 체크 }

  # --- 객실 ---
  - { method: GET,  path: /api/rooms,                  entity: Room,        action: list,   auth: false, description: 객실 목록 조회 }
  - { method: GET,  path: /api/rooms/{id},             entity: Room,        action: detail, auth: false, description: "객실 상세 조회 (일반요금/회원요금 + 예약가능 여부 포함)" }

  # --- 예약 ---
  - { method: POST, path: /api/reservations,           entity: Reservation, action: create, auth: true,  description: 예약 생성 }
  - { method: GET,  path: /api/reservations/my,        entity: Reservation, action: list,   auth: true,  description: 내 예약 목록 조회 }

## -------------------------------------------------------
## 4. 페이지
## -------------------------------------------------------
pages:

  - name: 메인
    path: /
    auth: false
    nav: false
    api: [GET /api/rooms]
    description: 랜딩 페이지 + 객실 목록 조회 (카드형, 클릭 시 객실 상세로 이동)

  - name: 회원가입
    path: /signup
    auth: false
    show_when: logged_out
    nav_order: 80
    api: [POST /api/members/signup, GET /api/members/check-id]
    form_fields:
      - { field: parcel_member_no, label: 분양회원번호,  type: text,     required: false, placeholder: "선택 입력" }
      - { field: member_name,      label: 이름,          type: text,     required: true }
      - { field: phone,            label: 연락처,        type: tel,      required: true,  placeholder: "010-0000-0000" }
      - { field: email,            label: 이메일,        type: email,    required: false }
      - { field: login_id,         label: 아이디,        type: text,     required: true,  inline_action: 중복확인 }
      - { field: password,         label: 비밀번호,      type: password, required: true }
      - { field: password_confirm, label: 비밀번호 확인, type: password, required: true }

  - name: 로그인
    path: /login
    auth: false
    show_when: logged_out
    nav_order: 90
    api: [POST /api/members/login]
    form_fields:
      - { field: login_id, label: 아이디,   type: text,     required: true }
      - { field: password,  label: 비밀번호, type: password, required: true }
    error_display: alert   # 로그인 실패 시 alert로 표시

  - name: 객실 상세
    path: /rooms/:id
    auth: false
    nav: false
    api: [GET /api/rooms/{id}]
    description: 객실 정보 + 일반요금/회원요금 표기 + 예약 버튼 (클릭 시 예약 페이지로 이동)

  - name: 예약
    path: /reservation/:roomId
    auth: true
    nav: false
    api: [POST /api/reservations, GET /api/rooms/{id}]
    form_fields:
      - { field: check_in_date, label: 입실일,         type: date,     required: true, constraint: "today ~ today+6months" }
      - { field: booker_info,   label: 예약자 정보,    type: display,  source: session, note: 로그인 회원의 이름/연락처 표시 (읽기 전용) }
      - { field: is_same_guest, label: 예약자와 동일,  type: checkbox, default: false, note: "체크 시 예약자 정보를 투숙자 정보로 자동 복사" }
      - { field: guest_name,    label: 투숙자명,       type: text,     required: true }
      - { field: guest_phone,   label: 투숙자 연락처,  type: tel,      required: true }

  - name: 예약 확인
    path: /my-reservations
    auth: true
    show_when: logged_in
    nav_order: 20
    api: [GET /api/reservations/my]
    display_fields:
      - { field: reservation_no,   label: 예약번호 }
      - { field: room_name,        label: 객실명 }
      - { field: check_in_date,    label: 입실일 }
      - { field: guest_name,       label: 투숙자명 }
      - { field: guest_phone,      label: 투숙자 연락처 }
      - { field: reservation_date, label: 예약일자 }
      - { field: member_type,      label: 회원유형 }
      - { field: status,           label: 예약상태 }

## -------------------------------------------------------
## 5. 권한
## -------------------------------------------------------
auth:
  method: session
  public_pages: [/, /signup, /login, "/rooms/:id"]
  protected_pages: ["/reservation/:roomId", /my-reservations]
  rule: 비로그인 사용자가 protected 페이지 접근 시 /login으로 리다이렉트

## -------------------------------------------------------
## 6. 핵심 비즈니스 로직 요약
## -------------------------------------------------------
business_rules:
  - parcel_member_no 존재 → PARCEL, 없으면 → GENERAL (별도 형식 검증 없음, 입력 여부만 판단)
  - 객실별 예약 가능 회원유형이 다름 (RoomPermission)
  - 객실별 회원유형별 금액이 다름 — 객실 상세에서 일반요금/회원요금 표기
  - 예약은 1박 1실만 가능
  - 예약가능일은 오늘 ~ 6개월 이후까지
  - 예약 시 회원유형 + 재고 검증 필수
  - 예약 성공 시 Room.stock_count -= 1
  - stock_count == 0 → 예약 불가
